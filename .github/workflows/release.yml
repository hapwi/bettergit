name: Release Desktop

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release-macos:
    name: Release macOS
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve release version
        id: release_meta
        shell: bash
        run: |
          raw="${GITHUB_REF_NAME}"
          version="${raw#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: $raw" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          if [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build macOS release assets
        env:
          BETTERGIT_BUILD_VERSION: ${{ steps.release_meta.outputs.version }}
          BETTERGIT_UPDATE_REPOSITORY: ${{ github.repository }}
        run: bun run dist

      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
          RELEASE_VERSION: ${{ steps.release_meta.outputs.version }}
          IS_PRERELEASE: ${{ steps.release_meta.outputs.is_prerelease }}
        run: |
          shopt -s nullglob
          files=(release/*.dmg release/*.zip release/*.blockmap release/latest*.yml)

          if (( ${#files[@]} == 0 )); then
            echo "No release assets found." >&2
            exit 1
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release upload "$TAG_NAME" "${files[@]}" --clobber
            exit 0
          fi

          args=("$TAG_NAME")
          args+=("${files[@]}")
          args+=(--title "BetterGit $RELEASE_VERSION" --generate-notes)

          if [[ "$IS_PRERELEASE" == "true" ]]; then
            args+=(--prerelease)
          else
            args+=(--latest)
          fi

          gh release create "${args[@]}"
